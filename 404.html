<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuAqui — Redirecionando...</title>
  <meta name="theme-color" content="#0a0a2a">
  <style>
    body{
      margin:0;
      background:#0a0a2a;
      color:#00ffcc;
      font-family:'Courier New',monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      font-size:14px;
    }
    .msg{ text-align:center; opacity:.7; }
  </style>
  <script>
    // GitHub Pages SPA redirect — técnica spa-github-pages
    // Converte o path em query string para o index.html recuperar
    (function(){
      var l = window.location;
      var path = l.pathname.slice(1) + (l.search ? l.search : '') + l.hash;
      if(path){
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(path)
        );
      } else {
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
      }
    })();
  </script>
</head>
<body>
  <div class="msg">↩ Redirecionando...</div>
</body>
</html>
